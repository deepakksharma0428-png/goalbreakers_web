<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Goalbreakers — The Kick</title>
<style>
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
 html,body{margin:0;height:100%;background:#05060d;overflow:hidden;color:#fff;touch-action:none;user-select:none}
 #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#05060d}
 #stage{position:relative;height:100%;aspect-ratio:780/1380;max-width:100%;max-height:100%;container-type:inline-size}
 canvas{display:block;width:100%;height:100%;background:#06101f;touch-action:none}
 .panel{position:absolute;z-index:6;pointer-events:auto}
 /* CURVE control — right edge */
 #curve{right:3%;top:44%;transform:translateY(-50%);width:21cqw;background:rgba(7,16,32,.8);border:1px solid #2c5278;border-radius:3cqw;padding:2cqw 1cqw;text-align:center;backdrop-filter:blur(6px)}
 #curve .lab{font-size:2.7cqw;color:#7fd0ff;letter-spacing:.1em}
 #curve .val{font-size:6.5cqw;font-weight:800;margin:1cqw 0;color:#ffd23d}
 #curve .row{display:flex;gap:1.5cqw;justify-content:center}
 #curve button{flex:1;font-size:6cqw;font-weight:800;color:#cfe9ff;background:#10243b;border:1px solid #2c5278;border-radius:2cqw;padding:1cqw 0}
 /* LEVEL chips — bottom-left */
 #level{left:3.5%;bottom:13%;display:flex;flex-direction:column;gap:1.6cqw}
 #level button{font-size:3.8cqw;font-weight:800;letter-spacing:.04em;color:#cfe9ff;background:rgba(7,16,32,.8);border:1px solid #2c5278;border-radius:2.5cqw;padding:2cqw 3.5cqw;min-width:24cqw}
 #level button.on{background:#1f6feb;border-color:#7fd0ff;color:#fff;box-shadow:0 0 16px #1f6feb}
 #shoot{left:50%;bottom:4.5%;transform:translateX(-50%);font-size:3.4cqw;font-weight:800;color:#ffe98a;text-shadow:0 2px 8px #000;z-index:6;pointer-events:none;text-align:center}
 #kmode{position:absolute;top:2.5%;right:3%;z-index:6;font-size:3.2cqw;color:#9fc4e6;background:rgba(7,16,32,.7);border:1px solid #2c5278;border-radius:2.5cqw;padding:1.5cqw 2.5cqw}
</style></head>
<body>
<div id="wrap"><div id="stage"><canvas id="cv" width="780" height="1380"></canvas>
<div class="panel" id="curve"><div class="lab">CURVE</div><div class="val" id="degv">0&deg;</div>
  <div class="row"><button id="cl">&#9664;</button><button id="cr">&#9654;</button></div></div>
<div class="panel" id="level">
  <button data-l="2">HIGH</button><button data-l="1" class="on">MID</button><button data-l="0">LOW</button></div>
<div id="shoot">HOLD the pitch to charge &mdash; release to STRIKE</div>
<div id="kmode" data-k="0">KEEPER: AGILE</div>
</div></div>
<script>
const W=780,H=1380, cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const GLX=180,GRX=600,GTY=840,GY=1000, GCX=(GLX+GRX)/2, GW=GRX-GLX;
const BX0=390,BY0=1340, YWALL=1135, WALLL=300, WALLR=480;
const KEEPERS=[{n:"AGILE",reach:0.30,spd:1.2,dmg:1.0},{n:"STRONG",reach:0.24,spd:0.95,dmg:0.55},{n:"WALL",reach:0.27,spd:1.05,dmg:0.8}];
const IMG={}, NEED=["stadium_bg2","keeper_ready","keeper_dive_l","keeper_dive_r","defender_block","striker_stance","striker_kickR","ball_plain"];
let loaded=0,ready=false; NEED.forEach(n=>{const i=new Image();i.onload=i.onerror=()=>{if(++loaded===NEED.length)ready=true;};i.src=(n==="stadium_bg2"?"sprites/":"sprites_t/")+n+".png";IMG[n]=i;});
let S={deg:0, level:1, kIdx:0, power:0, phase:"aim", charging:false, t0:0, strike:1, shots:[],
       ball:null, kx:GCX, kdir:0, result:"", rt:0, flash:0, shake:0, defJump:false, netR:0, striker:"stance"};
const TW=[];for(let i=0;i<26;i++)TW.push({x:Math.random()*W,y:120+Math.random()*640,r:1+Math.random()*2.4,p:Math.random()*6.3});

/* ---------- shot model (physics) ---------- */
function arrival(deg, level, power){
  const ax = GCX + (deg/20)*(GW*0.42);
  const ay = level===0 ? GY-15 : level===1 ? (GTY+GY)/2 : GTY+35;
  const over = (level===2 && power>0.93 && Math.abs(deg)<8);
  return {ax, ay:(over?GTY-40:ay), over};
}
function ease(x){return 1-Math.pow(1-x,2);}
function trajPoint(u, sh){ // sh = shot {ax,ay,deg,short}
  const m=u, e=ease(u);
  const endY = sh.short ? (BY0 + (sh.ay-BY0)*0.55) : sh.ay;
  const x = BX0 + (sh.ax-BX0)*e + (sh.deg/20)*70*Math.sin(Math.PI*u);
  const y = BY0 + (endY-BY0)*e;
  return {x, y, s:1-0.62*e};
}
function evaluate(sh){
  const K=KEEPERS[S.kIdx];
  if(sh.short) return "SHORT";
  if(sh.over) return "OVER";
  if(sh.ax<GLX-8||sh.ax>GRX+8) return "WIDE";
  // wall: find u where y≈YWALL
  let uW=0; for(let u=0;u<=1;u+=0.02){ if(trajPoint(u,sh).y<=YWALL){uW=u;break;} }
  const xW=trajPoint(uW,sh).x;
  if(sh.level<2 && xW>WALLL && xW<WALLR){ S.defJump=true; S.defX=xW; return "BLOCKED"; }
  if(Math.abs(sh.ax-GLX)<16||Math.abs(sh.ax-GRX)<16) return "POST";
  // keeper guesses a side, dives; reach by type, harder on a far high corner
  const side=(Math.random()<0.5?-1:1); const guess=GCX+side*Math.random()*GW*0.42;
  let reach=K.reach*GW; if(sh.level===2 && Math.abs(sh.ax-GCX)>GW*0.30) reach*=0.6;
  S.kTarget=guess;
  if(Math.abs(sh.ax-guess)<reach) return "SAVE";
  return "GOAL";
}

/* ---------- controls ---------- */
document.getElementById('cl').onclick=()=>{S.deg=Math.max(-20,S.deg-5);upd();};
document.getElementById('cr').onclick=()=>{S.deg=Math.min(20,S.deg+5);upd();};
document.querySelectorAll('#level button').forEach(b=>b.onclick=()=>{ if(S.phase!=="aim")return;
  document.querySelectorAll('#level button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); S.level=+b.dataset.l; });
document.getElementById('kmode').onclick=()=>{S.kIdx=(S.kIdx+1)%3; document.getElementById('kmode').textContent="KEEPER: "+KEEPERS[S.kIdx].n;};
function upd(){ document.getElementById('degv').innerHTML=(S.deg>0?"+":"")+S.deg+"&deg;"; }
upd();
cv.addEventListener('pointerdown',e=>{ ensureAudio(); if(S.phase==="result"){reset();return;} if(S.phase==="aim"){S.charging=true;S.t0=performance.now();rumble(true);} });
window.addEventListener('pointerup',()=>{ if(S.charging) release(); });
function release(){ S.charging=false; rumble(false);
  const sh=arrival(S.deg,S.level,S.power); sh.deg=S.deg; sh.level=S.level; sh.short=S.power<0.33;
  S.result=evaluate(sh); S.ball={sh, u:0, T:1.05-0.45*S.power}; S.striker="kick"; S.phase="flight";
  S.kx=GCX; S.kdir=0; S.flash=.5; S.shake=8; whoosh(S.power); }

/* ---------- loop ---------- */
let last=performance.now();
function frame(now){ const dt=Math.min(.05,(now-last)/1000); last=now;
  if(S.charging) S.power=Math.min(1,(now-S.t0)/1300);
  if(S.shake>0)S.shake=Math.max(0,S.shake-dt*42); if(S.flash>0)S.flash=Math.max(0,S.flash-dt*2.2); if(S.netR>0)S.netR=Math.max(0,S.netR-dt*2.2);
  if(S.phase==="flight"){ const b=S.ball; b.u+=dt/b.T; const u=Math.min(1,b.u);
    const K=KEEPERS[S.kIdx]; const tgt=(S.result==="SAVE"||S.result==="GOAL")?(S.kTarget||GCX):GCX;
    S.kx=GCX+(tgt-GCX)*ease(Math.min(1,u*K.spd)); S.kdir=tgt<GCX-6?-1:(tgt>GCX+6?1:0);
    if(S.defJump && u>0.30 && u<0.6) S.defLift=ease((u-0.3)/0.3)*70; else if(u>=0.6) S.defLift=0;
    if(b.u>=1){ outcome(); } }
  if(S.phase==="result") S.rt+=dt;
  draw(now/1000); requestAnimationFrame(frame); }
function outcome(){ const r=S.result; S.shots[S.strike-1]=r;
  if(r==="GOAL"){S.netR=1;S.flash=1;S.shake=16;S.striker="celebrate";S.sound="goal";}
  else {S.shake=12;S.sound=(r==="POST"?"post":(r==="SAVE"?"save":"miss"));}
  S.phase="result"; if(S.sound){play(S.sound);S.sound=null;} }
function reset(){ S.strike=S.strike>=5?1:S.strike+1; if(S.strike===1)S.shots=[]; S=Object.assign(S,{power:0,phase:"aim",charging:false,ball:null,kx:GCX,kdir:0,result:"",rt:0,striker:"stance",defJump:false,defLift:0,netR:0,kTarget:null}); }

/* ---------- draw ---------- */
function spr(name,cx,cy,h){const im=IMG[name];if(!im||!im.width)return;const s=h/im.height,w=im.width*s;ctx.drawImage(im,cx-w/2,cy-h,w,h);}
function draw(t){
  ctx.clearRect(0,0,W,H);
  if(!ready){ctx.fillStyle="#06101f";ctx.fillRect(0,0,W,H);ctx.fillStyle="#7fdcff";ctx.textAlign="center";ctx.font="32px sans-serif";ctx.fillText("Loading…",W/2,H/2);return;}
  const sh=S.shake>0?(Math.random()*2-1)*S.shake:0; ctx.save();ctx.translate(sh,sh*0.5);
  const bg=IMG.stadium_bg2; if(bg&&bg.width){const r=Math.max(W/bg.width,H/bg.height),bw=bg.width*r,bh=bg.height*r;ctx.drawImage(bg,(W-bw)/2,(H-bh)/2,bw,bh);}
  for(const tw of TW){const a=0.2+0.35*Math.sin(t*2.2+tw.p);ctx.save();ctx.globalAlpha=Math.max(0,a);ctx.fillStyle="#dff3ff";ctx.beginPath();ctx.arc(tw.x,tw.y,tw.r,0,7);ctx.fill();ctx.restore();}
  // net ripple (behind-goal correct: ball goes INTO net above the line)
  if(S.netR>0){ctx.save();ctx.globalAlpha=S.netR*0.55;ctx.strokeStyle="#cfeaff";ctx.lineWidth=3;for(let i=0;i<5;i++){const yy=GTY+i*((GY-GTY)/4);ctx.beginPath();ctx.moveTo(GLX,yy);ctx.lineTo(GRX,yy+Math.sin(t*30+i)*5);ctx.stroke();}ctx.restore();}
  // keeper
  let kn="keeper_ready"; if(S.phase!=="aim"){ if(S.kdir<0)kn="keeper_dive_l"; else if(S.kdir>0)kn="keeper_dive_r"; }
  const kArc=(S.phase==="flight")?Math.sin(Math.min(1,S.ball.u)*Math.PI)*16:0; spr(kn,S.kx,GY-kArc,150);
  // wall: 2 defenders
  spr("defender_block",330,YWALL-(S.defJump&&Math.abs((S.defX||0)-330)<((S.defX||0)<390?120:120)?S.defLift||0:0),150);
  spr("defender_block",460,YWALL-(S.defJump&&Math.abs((S.defX||0)-460)<120?S.defLift||0:0),150);
  // ball in flight
  if(S.ball){const p=trajPoint(Math.min(1,S.ball.u),S.ball.sh),bs=46*p.s+14;
    ctx.save();ctx.globalCompositeOperation="lighter";ctx.fillStyle="rgba(120,200,255,.5)";ctx.beginPath();ctx.arc(p.x,p.y,bs*0.8,0,7);ctx.fill();ctx.restore();
    const bi=IMG.ball_plain;if(bi&&bi.width){const bw=bs*(bi.width/bi.height);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(S.ball.u*22);ctx.drawImage(bi,-bw/2,-bs/2,bw,bs);ctx.restore();}}
  // striker + resting ball
  spr(S.striker==="celebrate"?"striker_kickR":(S.striker==="kick"?"striker_kickR":"striker_stance"),360,1378,360);
  if(S.phase==="aim"){const bi=IMG.ball_plain;if(bi&&bi.width){const s=86,bw=s*(bi.width/bi.height);ctx.drawImage(bi,BX0-bw/2,BY0-s/2,bw,s);}}
  ctx.restore();
  if(S.flash>0){ctx.fillStyle="rgba(255,255,255,"+(S.flash*0.6)+")";ctx.fillRect(0,0,W,H);}
  hud();
}
function hud(){
  ctx.textAlign="left";ctx.fillStyle="#ffe98a";ctx.font="bold 24px sans-serif";ctx.fillText("STRIKE "+S.strike+"/5",24,42);
  for(let i=0;i<5;i++){const cx=34+i*32,cyy=66;ctx.beginPath();ctx.arc(cx,cyy,12,0,7);const rs=S.shots[i];ctx.fillStyle=rs?(rs==="GOAL"?"#2ec27e":"#d2453a"):((i+1)===S.strike?"#ffd23d":"rgba(255,255,255,.22)");ctx.fill();ctx.strokeStyle="rgba(255,255,255,.45)";ctx.lineWidth=2;ctx.stroke();}
  // power gauge while charging
  if(S.charging){ const x=W*0.14,y=H*0.80,w=W*0.72,h=20; ctx.fillStyle="rgba(6,14,30,.8)";ctx.fillRect(x,y,w,h);
    ctx.fillStyle="#ffd23d";ctx.fillRect(x+3,y+3,(w-6)*S.power,h-6);
    ctx.textAlign="center";ctx.fillStyle="#dff3ff";ctx.font="bold 22px sans-serif";ctx.fillText("POWER",W/2,y-10); }
  if(S.phase==="result"){const big={GOAL:"⚡ GOAL! ⚡",SAVE:"SAVED!",POST:"OFF THE POST!",WIDE:"WIDE!",OVER:"OVER THE BAR!",SHORT:"TOO SOFT!",BLOCKED:"WALL BLOCK!"}[S.result]||S.result;
    ctx.textAlign="center";ctx.fillStyle=S.result==="GOAL"?"#ffd23d":"#ff7a7a";ctx.font="bold 66px sans-serif";ctx.fillText(big,W/2,H*0.36);
    ctx.fillStyle="#dff3ff";ctx.font="bold 24px sans-serif";ctx.fillText("tap to shoot again",W/2,H*0.36+42);}
}
requestAnimationFrame(frame);
/* ---------- audio ---------- */
let A=null,master,rumbleNode=null;
function ensureAudio(){if(!A){A=new(window.AudioContext||window.webkitAudioContext)();master=A.createGain();master.gain.value=.55;master.connect(A.destination);}if(A.state==='suspended')A.resume();}
function noise(d){const b=A.createBuffer(1,A.sampleRate*d,A.sampleRate),x=b.getChannelData(0);for(let i=0;i<x.length;i++)x[i]=Math.random()*2-1;const s=A.createBufferSource();s.buffer=b;return s;}
function rumble(on){if(!A)return;if(on){rumbleNode=A.createOscillator();const g=A.createGain();rumbleNode._g=g;rumbleNode.type='sawtooth';rumbleNode.frequency.setValueAtTime(40,A.currentTime);rumbleNode.frequency.linearRampToValueAtTime(120,A.currentTime+1.3);g.gain.setValueAtTime(.0001,A.currentTime);g.gain.linearRampToValueAtTime(.22,A.currentTime+1.3);rumbleNode.connect(g);g.connect(master);rumbleNode.start();}else if(rumbleNode){try{rumbleNode._g.gain.exponentialRampToValueAtTime(.001,A.currentTime+.1);rumbleNode.stop(A.currentTime+.12);}catch(e){}rumbleNode=null;}}
function whoosh(p){if(!A)return;const t=A.currentTime;const s=noise(.3),bp=A.createBiquadFilter();bp.type='bandpass';bp.frequency.setValueAtTime(400,t);bp.frequency.exponentialRampToValueAtTime(3500,t+.28);const g=A.createGain();g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.4+p*.3,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.3);s.connect(bp);bp.connect(g);g.connect(master);s.start(t);s.stop(t+.3);}
function play(k){if(!A)return;const t=A.currentTime;
 if(k==='goal'){for(let j=0;j<3;j++){const ts=t+j*.16,o=A.createOscillator(),g=A.createGain();o.type='triangle';o.frequency.setValueAtTime(2300,ts);const lf=A.createOscillator(),lg=A.createGain();lf.frequency.value=30;lg.gain.value=130;lf.connect(lg);lg.connect(o.frequency);lf.start(ts);lf.stop(ts+.13);g.gain.setValueAtTime(.0001,ts);g.gain.exponentialRampToValueAtTime(.3,ts+.01);g.gain.exponentialRampToValueAtTime(.001,ts+.14);o.connect(g);g.connect(master);o.start(ts);o.stop(ts+.15);}const s=noise(1.4),bp=A.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800;bp.Q.value=.6;const g=A.createGain();g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.24,t+.3);g.gain.exponentialRampToValueAtTime(.001,t+1.4);s.connect(bp);bp.connect(g);g.connect(master);s.start(t);s.stop(t+1.4);}
 else if(k==='post'){const o=A.createOscillator(),g=A.createGain();o.type='triangle';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(300,t+.5);g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.connect(g);g.connect(master);o.start(t);o.stop(t+.6);}
 else if(k==='save'){const o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(70,t+.18);g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g);g.connect(master);o.start(t);o.stop(t+.22);}
 else{const s=noise(.2),lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;const g=A.createGain();g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);s.connect(lp);lp.connect(g);g.connect(master);s.start(t);s.stop(t+.2);}}
</script></body></html>
